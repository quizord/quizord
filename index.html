<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Ord Editor & Publisher</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --box-bg: #fff;
            --text: #2c3e50;
            --input-bg: #fff;
            --input-border: #ddd;
            --btn-bg: #2c3e50;
            --btn-text: #fff;
            --clue-bg: #f8f9fa;
            --shadow: rgba(0,0,0,0.08);
        }
        .dark-mode {
            --bg: #1a1a2e;
            --box-bg: #16213e;
            --text: #e0e0e0;
            --input-bg: #0f3460;
            --input-border: #1a1a4e;
            --btn-bg: #e94560;
            --btn-text: #fff;
            --clue-bg: #1a1a3e;
            --shadow: rgba(0,0,0,0.3);
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; max-width: 1100px; margin: 0 auto; color: var(--text); transition: all 0.3s; }
        h1, h2, h3 { color: var(--text); margin-top: 0; }
        .box { background: var(--box-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px var(--shadow); margin-bottom: 25px; }
        .editor-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 12px; }
        .editor-row label { min-width: 60px; font-weight: 600; padding-top: 8px; }
        .editor-row input { flex: 1; padding: 8px 12px; border: 2px solid var(--input-border); border-radius: 8px; font-size: 16px; text-transform: uppercase; min-width: 100px; background: var(--input-bg); color: var(--text); }
        .editor-row input:focus { border-color: #3498db; outline: none; }
        .clue-group { background: var(--clue-bg); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; gap: 10px; align-items: center; }
        .clue-group span { font-weight: bold; min-width: 20px; }
        .clue-group input { flex: 1; padding: 8px; border: 1px solid var(--input-border); border-radius: 6px; background: var(--input-bg); color: var(--text); }
        button { background: var(--btn-bg); color: var(--btn-text); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; margin: 3px; }
        button:hover { opacity: 0.85; transform: scale(1.02); }
        .btn-success { background: #27ae60; } .btn-success:hover { background: #2ecc71; }
        .btn-warning { background: #f39c12; } .btn-warning:hover { background: #e67e22; }
        .btn-danger { background: #e74c3c; } .btn-danger:hover { background: #c0392b; }
        .btn-dark { background: #555; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        #generator-section { display: none; }
        #variants-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin: 20px 0; }
        .variant-card { border: 2px solid #ddd; border-radius: 8px; padding: 15px; background: white; cursor: pointer; transition: 0.2s; }
        .variant-card:hover { border-color: #3498db; transform: scale(1.02); }
        .variant-card.selected { border-color: #27ae60; background: #e8f8f5; }
        .variant-card table { border-collapse: collapse; margin: 0 auto; }
        .variant-card td { width: 30px; height: 30px; border: 1px solid #bdc3c7; text-align: center; font-size: 14px; font-weight: bold; }
        .variant-card td.empty { border: none; background: transparent; }
        #play-section { display: none; }
        @media print { body { background: white; } .box { box-shadow: none; } button { display: none; } }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>📝 Quiz Ord Editor</h1>
    <button onclick="toggleDarkMode()" class="btn-dark" id="dark-btn">🌙 Dark Mode</button>
</div>

<div class="box" id="editor-section">
    <h3>1. Skapa din gåta</h3>
    <div class="editor-row"><label>Gåta:</label><input type="text" id="puzzle-text" placeholder="Skriv hela gåtan här..." value="Jag snurrar och ger glädje åt barn, men står stadigt fast på marken. Runt och runt går jag, men kommer ingenstans. Vad är jag?"></div>
    <div class="editor-row"><label>Lösning:</label><input type="text" id="solution-word" placeholder="Lösningsord (quiz ordet)" value="KARUSELL"></div>
    <h3>Ledtrådar (3 st)</h3>
    <div id="clues-editor">
        <div class="clue-group"><span>1.</span><input type="text" class="clue-text" placeholder="Ledtråd 1" value="Djur man ofta rider på"><input type="text" class="clue-answer" placeholder="Svar 1" value="HÄST"></div>
        <div class="clue-group"><span>2.</span><input type="text" class="clue-text" placeholder="Ledtråd 2" value="Cirkel som pryder fingrar"><input type="text" class="clue-answer" placeholder="Svar 2" value="RING"></div>
        <div class="clue-group"><span>3.</span><input type="text" class="clue-text" placeholder="Ledtråd 3" value="Toner som spelas på tivoli"><input type="text" class="clue-answer" placeholder="Svar 3" value="MUSIK"></div>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">
        <button onclick="generateVariants()" style="flex:1;">🔍 Generera varianter</button>
        <button onclick="saveDraft()" class="btn-warning" style="flex:0.5;">💾 Spara utkast</button>
        <button onclick="loadDraft()" class="btn-success" style="flex:0.5;">📂 Ladda utkast</button>
    </div>
</div>

<div class="box" id="generator-section">
    <h3>2. Välj layout</h3>
    <p id="generator-status"></p>
    <div id="variants-container"></div>
    <div style="display:flex; gap:10px; justify-content:center; margin-top:15px;">
        <button onclick="backToEditor()" class="btn-warning">← Tillbaka till redaktör</button>
        <button onclick="publishSelected()" class="btn-success" id="publish-btn" disabled>✅ Publicera vald variant</button>
    </div>
</div>

<div class="box" id="play-section">
    <h3>3. Spelklar gåta</h3>
    <div id="play-view"></div>
    <div style="display:flex; gap:10px; justify-content:center; margin-top:15px; flex-wrap:wrap;">
        <button onclick="backToGenerator()" class="btn-warning">← Välj annan variant</button>
        <button onclick="showSolution()" class="btn-warning" id="show-solution-btn">👁️ Visa lösning (admin)</button>
        <button onclick="exportHtml()" class="btn-success" id="export-btn">📤 Ladda ner spelbar HTML</button>
    </div>
</div>

<script>
// ============ DARK MODE ============
function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    const btn = document.getElementById('dark-btn');
    btn.innerHTML = document.body.classList.contains('dark-mode') ? '☀️ Light Mode' : '🌙 Dark Mode';
}

// ============ SAVE / LOAD DRAFT ============
function saveDraft() {
    const draft = {
        puzzleText: document.getElementById('puzzle-text').value,
        solutionWord: document.getElementById('solution-word').value,
        clues: []
    };
    const clueTexts = document.querySelectorAll('.clue-text');
    const clueAnswers = document.querySelectorAll('.clue-answer');
    for (let i = 0; i < clueTexts.length; i++) {
        draft.clues.push({ text: clueTexts[i].value, answer: clueAnswers[i].value });
    }
    localStorage.setItem('quizord-draft', JSON.stringify(draft));
    alert('✅ Utkast sparat!');
}
function loadDraft() {
    const draftJson = localStorage.getItem('quizord-draft');
    if (!draftJson) { alert('Inget utkast hittat.'); return; }
    const draft = JSON.parse(draftJson);
    document.getElementById('puzzle-text').value = draft.puzzleText || '';
    document.getElementById('solution-word').value = draft.solutionWord || '';
    const clueTexts = document.querySelectorAll('.clue-text');
    const clueAnswers = document.querySelectorAll('.clue-answer');
    if (draft.clues) {
        for (let i = 0; i < clueTexts.length; i++) {
            if (draft.clues[i]) {
                clueTexts[i].value = draft.clues[i].text || '';
                clueAnswers[i].value = draft.clues[i].answer || '';
            }
        }
    }
    alert('📂 Utkast laddat!');
}

// ============ EDITOR ENGINE (oförändrad) ============
let allWords = [], allClues = [], puzzleText = '', solutionWord = '', generatedLayouts = [], selectedLayout = null, playGridData = null;

function placeWord(word, startX, startY, dir, grid) {
    let cells = [];
    for (let i = 0; i < word.length; i++) {
        let x = startX + (dir === 0 ? i : 0), y = startY + (dir === 0 ? 0 : i);
        if (x < 0 || x >= grid.length || y < 0 || y >= grid.length) return null;
        cells.push({x, y, char: word[i]});
    }
    return cells;
}
function isValidPlacement(grid, cells) {
    for (let cell of cells) { const existing = grid[cell.y][cell.x]; if (existing !== null && existing !== cell.char) return false; }
    return true;
}
function findAllPlacements(grid, word) {
    const size = grid.length; let placements = [];
    for (let y = 0; y < size; y++) for (let x = 0; x < size; x++) for (let dir = 0; dir < 2; dir++) { let cells = placeWord(word, x, y, dir, grid); if (cells && isValidPlacement(grid, cells)) placements.push({cells, x, y, dir}); }
    return placements;
}
function extractAllWords(grid) {
    let foundWords = new Set(); const size = grid.length;
    for (let y = 0; y < size; y++) { let current = ''; for (let x = 0; x < size; x++) { if (grid[y][x] !== null) current += grid[y][x]; else { if (current.length >= 2) foundWords.add(current); current = ''; } } if (current.length >= 2) foundWords.add(current); }
    for (let x = 0; x < size; x++) { let current = ''; for (let y = 0; y < size; y++) { if (grid[y][x] !== null) current += grid[y][x]; else { if (current.length >= 2) foundWords.add(current); current = ''; } } if (current.length >= 2) foundWords.add(current); }
    return foundWords;
}
function generateStrictLayouts(words) {
    words.sort((a, b) => b.length - a.length); const gridSize = 15; let allValid = [];
    let grid = Array(gridSize).fill().map(() => Array(gridSize).fill(null));
    let placements1 = findAllPlacements(grid, words[0]);
    for (let p1 of placements1) {
        let g1 = Array(gridSize).fill().map(() => Array(gridSize).fill(null)); for (let c of p1.cells) g1[c.y][c.x] = c.char;
        let placements2 = findAllPlacements(g1, words[1]);
        for (let p2 of placements2) {
            let crosses1 = false; for (let c of p2.cells) if (g1[c.y][c.x] !== null) { crosses1 = true; break; } if (!crosses1) continue;
            let g2 = g1.map(row => row.slice()); for (let c of p2.cells) g2[c.y][c.x] = c.char;
            let placements3 = findAllPlacements(g2, words[2]);
            for (let p3 of placements3) {
                let crosses2 = false; for (let c of p3.cells) if (g2[c.y][c.x] !== null) { crosses2 = true; break; } if (!crosses2) continue;
                let g3 = g2.map(row => row.slice()); for (let c of p3.cells) g3[c.y][c.x] = c.char;
                let placements4 = findAllPlacements(g3, words[3]);
                for (let p4 of placements4) {
                    let crosses3 = false; for (let c of p4.cells) if (g3[c.y][c.x] !== null) { crosses3 = true; break; } if (!crosses3) continue;
                    let finalGrid = g3.map(row => row.slice()); for (let c of p4.cells) finalGrid[c.y][c.x] = c.char;
                    const foundWords = extractAllWords(finalGrid);
                    if (foundWords.size === words.length) { let match = true; for (let w of foundWords) { if (!words.includes(w)) { match = false; break; } } if (match) allValid.push(finalGrid); }
                }
            }
        }
    }
    let unique = [], seen = new Set();
    for (let layout of allValid) {
        let hash = '', minX = gridSize, maxX = 0, minY = gridSize, maxY = 0;
        for (let y = 0; y < gridSize; y++) for (let x = 0; x < gridSize; x++) if (layout[y][x] !== null) { if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; }
        for (let y = minY; y <= maxY; y++) { for (let x = minX; x <= maxX; x++) hash += (layout[y][x] || '.'); hash += '|'; }
        if (!seen.has(hash)) { seen.add(hash); unique.push(layout); }
    }
    return unique;
}

function generateVariants() {
    puzzleText = document.getElementById('puzzle-text').value.trim();
    solutionWord = document.getElementById('solution-word').value.trim().toUpperCase();
    const clueTexts = document.querySelectorAll('.clue-text'), clueAnswers = document.querySelectorAll('.clue-answer');
    allWords = [solutionWord]; allClues = [];
    for (let i = 0; i < clueTexts.length; i++) { const text = clueTexts[i].value.trim(), answer = clueAnswers[i].value.trim().toUpperCase(); if (text && answer) { allWords.push(answer); allClues.push({text, answer}); } }
    if (!puzzleText || !solutionWord || allWords.length < 4) { alert('Fyll i gåta, lösningsord och alla 3 ledtrådar med svar.'); return; }
    document.getElementById('editor-section').style.display = 'none';
    document.getElementById('generator-section').style.display = 'block';
    document.getElementById('play-section').style.display = 'none';
    document.getElementById('generator-status').innerHTML = 'Genererar varianter...';
    setTimeout(() => { const layouts = generateStrictLayouts([...allWords]); generatedLayouts = layouts; renderVariants(layouts); }, 100);
}

function renderVariants(layouts) {
    const container = document.getElementById('variants-container'); container.innerHTML = '';
    const status = document.getElementById('generator-status');
    if (layouts.length === 0) { status.innerHTML = '<span style="color:#e74c3c;">❌ Inga varianter hittades.</span>'; document.getElementById('publish-btn').disabled = true; return; }
    status.innerHTML = `<span style="color:#27ae60;">✅ Hittade ${layouts.length} varianter.</span>`;
    document.getElementById('publish-btn').disabled = true; selectedLayout = null;
    const gridSize = 15;
    for (let i = 0; i < layouts.length; i++) {
        const layout = layouts[i], card = document.createElement('div'); card.className = 'variant-card'; card.dataset.index = i;
        let minX = gridSize, maxX = 0, minY = gridSize, maxY = 0;
        for (let y = 0; y < gridSize; y++) for (let x = 0; x < gridSize; x++) if (layout[y][x] !== null) { if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; }
        const table = document.createElement('table');
        for (let y = minY; y <= maxY; y++) { const tr = document.createElement('tr'); for (let x = minX; x <= maxX; x++) { const td = document.createElement('td'); const cell = layout[y][x]; td.textContent = cell || ''; if (cell === null) td.className = 'empty'; tr.appendChild(td); } table.appendChild(tr); }
        card.appendChild(table);
        card.onclick = function() { document.querySelectorAll('.variant-card').forEach(el => el.classList.remove('selected')); this.classList.add('selected'); selectedLayout = layouts[this.dataset.index]; document.getElementById('publish-btn').disabled = false; };
        container.appendChild(card);
    }
}

function backToEditor() { document.getElementById('editor-section').style.display = 'block'; document.getElementById('generator-section').style.display = 'none'; document.getElementById('play-section').style.display = 'none'; }
function publishSelected() { if (!selectedLayout) return; document.getElementById('generator-section').style.display = 'none'; document.getElementById('play-section').style.display = 'block'; renderPlayView(selectedLayout); }
function backToGenerator() { document.getElementById('play-section').style.display = 'none'; document.getElementById('generator-section').style.display = 'block'; }
function showSolution() { const grid = playGridData.grid; document.querySelectorAll('#play-view input[data-cell-id]').forEach(inp => { const [y,x] = inp.dataset.cellId.split('-').map(Number); if (grid[y] && grid[y][x]) inp.value = grid[y][x]; }); }

function renderPlayView(grid) {
    const container = document.getElementById('play-view'); const gridSize = 15;
    let minX = gridSize, maxX = 0, minY = gridSize, maxY = 0;
    for (let y = 0; y < gridSize; y++) for (let x = 0; x < gridSize; x++) if (grid[y][x] !== null) { if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; }
    playGridData = { grid, minX, maxX, minY, maxY };
    let html = `<div style="display:flex; gap:20px;"><div><table class="grid" style="border-collapse:collapse; border:3px solid #2c3e50;">`;
    for (let y = minY; y <= maxY; y++) { html += '<tr>'; for (let x = minX; x <= maxX; x++) { const cell = grid[y][x]; html += cell !== null ? `<td style="width:42px;height:42px;border:1.5px solid #999;text-align:center;background:white;"><input type="text" maxlength="1" data-cell-id="${y}-${x}" style="width:100%;height:100%;border:none;text-align:center;font-size:20px;font-weight:bold;text-transform:uppercase;font-family:'Patrick Hand',Verdana,sans-serif;" oninput="this.value=this.value.toUpperCase().replace(/[^A-ZÅÄÖ0-9\-]/g,'')"></td>` : '<td style="border:none;background:transparent;"></td>'; } html += '</tr>'; }
    html += `</table></div><div style="flex:1;"><h3>📝 Ledtrådar</h3><div style="font-weight:bold;">${puzzleText}</div>`;
    allClues.forEach((c, i) => { html += `<div style="margin-bottom:8px;padding:8px;border-left:4px solid #bdc3c7;background:#f8f9fa;font-family:'Patrick Hand',Verdana,sans-serif;"><span style="display:inline-block;width:26px;height:26px;background:#2c3e50;color:white;border-radius:4px;text-align:center;line-height:26px;font-weight:bold;margin-right:8px;">${i+1}</span><strong>${c.text}</strong> <span style="color:#555;">(${c.answer.length} bokstäver)</span></div>`; });
    html += `<h3>🔢 Bokstavsvärden</h3><div style="display:flex;flex-direction:column;gap:2px;padding:10px;background:#f1f2f6;border-radius:8px;">`;
    const valGroups = [['A','B','C','D','E','F',1],['G','H','I','J','K','L',2],['M','N','O','P','Q','R',3],['S','T','U','V','W','X',4],['Y','Z','Å','Ä','Ö',5]];
    valGroups.forEach(g => { html += `<div style="display:flex;gap:6px;align-items:center;"><div style="display:flex;gap:3px;min-width:160px;">${g.slice(0,6).map(l=>`<span style="background:white;padding:1px 5px;border-radius:4px;border:1px solid #ddd;font-size:12px;">${l}</span>`).join('')}</div><span>=</span><span style="background:#2c3e50;color:white;padding:1px 6px;border-radius:6px;font-size:12px;">${g[6]}</span></div>`; });
    html += `</div><div style="margin-top:10px;padding:8px;background:#f8f9fa;border-radius:8px;font-style:italic;">Vad är lösningsordet? (${solutionWord.length} bokstäver)</div></div></div>`;
    container.innerHTML = html;
}

// ============ EXPORT (med återställning som rensar alla markeringar) ============
function exportHtml() {
    if (!playGridData) return;
    const { grid, minX, maxX, minY, maxY } = playGridData;

    function findWordStart(g, w, mix, miy, max, may) {
        for (let y = miy; y <= may; y++) { let row = ''; for (let x = mix; x <= max; x++) { if (g[y][x] !== null) row += g[y][x]; else { if (row === w) return {y, x: x - w.length, dir: 'H'}; row = ''; } } if (row === w) return {y, x: max + 1 - w.length, dir: 'H'}; }
        for (let x = mix; x <= max; x++) { let col = ''; for (let y = miy; y <= may; y++) { if (g[y][x] !== null) col += g[y][x]; else { if (col === w) return {y: y - w.length, x, dir: 'V'}; col = ''; } } if (col === w) return {y: may + 1 - w.length, x, dir: 'V'}; }
        return null;
    }

    const givenCells = {};
    for (let clue of allClues) { const pos = findWordStart(grid, clue.answer, minX, minY, maxX, maxY); if (pos) givenCells[pos.y+'-'+pos.x] = {char: clue.answer[0], type: 'clue'}; }
    const solPos = findWordStart(grid, solutionWord, minX, minY, maxX, maxY);
    if (solPos) givenCells[solPos.y+'-'+solPos.x] = {char: solutionWord[0], type: 'solution'};

    let gridHtml = '';
    for (let y = minY; y <= maxY; y++) {
        gridHtml += '<tr>';
        for (let x = minX; x <= maxX; x++) {
            const cell = grid[y][x];
            if (cell !== null) {
                const cellId = y+'-'+x, given = givenCells[cellId];
                if (given) {
                    const cls = given.type==='solution' ? 'given solution-given' : 'given';
                    gridHtml += `<td class="active ${cls}" data-cell-id="${cellId}"><span>${given.char}</span></td>`;
                } else if (cell === '-') {
                    gridHtml += `<td class="active given dash-given" data-cell-id="${cellId}"><span>-</span></td>`;
                } else {
                    gridHtml += `<td class="active" data-cell-id="${cellId}"><input type="text" maxlength="1" data-cell-id="${cellId}" value="" oninput="this.value=this.value.toUpperCase().replace(/[^A-ZÅÄÖ0-9\-]/g,'')"></td>`;
                }
            } else { gridHtml += '<td class="empty"></td>'; }
        }
        gridHtml += '</tr>';
    }

    let cluesStaticHtml = '';
    allClues.forEach((c, i) => {
        let sum = 0; for (let ch of c.answer) { const u = ch.toUpperCase(); if ("ABCDEF".includes(u)) sum+=1; else if ("GHIJKL".includes(u)) sum+=2; else if ("MNOPQR".includes(u)) sum+=3; else if ("STUVWX".includes(u)) sum+=4; else if ("YZÅÄÖ".includes(u)) sum+=5; }
        cluesStaticHtml += `<div class="clue-item" data-word="${c.answer}"><span class="clue-number">${i+1}</span><span class="clue-text">${c.text}</span><span class="clue-sum-box"><span class="clue-sum-live" id="sum-live-${c.answer}">0 / ${sum}</span></span></div>`;
    });

    const fullHtml = `<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Ord – ${solutionWord}</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;padding:15px;max-width:950px;margin:0 auto}
.container{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;flex-wrap:wrap}
.logo{flex:0 0 auto;text-align:left}
.logo h1{font-size:1.8rem;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,#2c3e50 0%,#3498db 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:0;display:inline}
.logo .sub{display:block;font-size:.85rem;color:#7f8c8d;letter-spacing:2px;margin-top:-2px}
.spacer{flex:0 0 auto;min-width:180px;visibility:hidden}
.instruction{flex:1;text-align:center;font-family:'Segoe UI',sans-serif;font-size:1.2rem;color:#666;line-height:1.4;padding:0 10px}
.puzzle-banner{background:#2c3e50;color:white;padding:18px;border-radius:10px;margin-bottom:18px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer}
.puzzle-banner h2{margin:0;font-family:'Segoe UI',sans-serif;font-weight:bold;font-size:1.6rem}
.puzzle-banner small{display:block;margin-top:4px;font-size:.9rem;opacity:.85}
.top-bar{display:flex;align-items:center;gap:15px;margin-bottom:15px;flex-wrap:wrap}
.top-bar button{background:#ecf0f1;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-weight:600;color:#2c3e50;transition:.2s}
.top-bar button:hover{background:#d5dbdb}
.clues-heading{margin:0;font-family:'Segoe UI',sans-serif;font-size:1.4rem}
.win-message{background:#f1c40f;color:#2c3e50;font-weight:bold;font-size:1.1rem;padding:8px 15px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);animation:pulse 1.5s infinite,shimmer 2s infinite;position:relative;overflow:hidden;display:none}
@keyframes pulse{0%{box-shadow:0 0 4px #f1c40f}50%{box-shadow:0 0 10px #f1c40f}100%{box-shadow:0 0 4px #f1c40f}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
.win-message::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,rgba(255,255,255,0) 30%,rgba(255,255,255,.4) 50%,rgba(255,255,255,0) 70%);animation:shimmer 2s infinite;transform:rotate(25deg)}
.play-grid{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;align-items:flex-start}
.grid-wrapper{flex:0 0 auto;padding:8px;border:3px solid #2c3e50;border-radius:10px;background:#f1f2f6}
table.grid{border-collapse:collapse;margin:0 auto}
td{width:42px;height:42px;border:1.5px solid #333;text-align:center;font-size:22px;font-weight:bold;vertical-align:middle;background:white;transition:outline .15s;position:relative;outline:2px solid transparent}
td.empty{border:none;background:transparent;outline:none}
td.active{background:#fff}
td.given{background:#e3f2fd}
td.solution-given{background:#2c3e50}
td.solution-given span{color:white}
td.dash-given{background:#e0e0e0}
td.dash-given span{color:#333;font-weight:bold}
td.given span{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:22px;font-family:'Patrick Hand',Verdana,sans-serif}
td.active input{width:100%;height:100%;border:none;text-align:center;font-size:22px;font-weight:bold;background:transparent;outline:none;text-transform:uppercase;padding:0;margin:0;cursor:pointer;font-family:'Patrick Hand',Verdana,sans-serif}
td.active input:focus{background:#fcf8e3}
td.word-active{outline-color:#5dade2}
td.given.word-active{outline-color:transparent}
td.solution-correct{background:#fef9e7;border-color:#f1c40f;color:#b8860b;animation:pulse 1.5s infinite}
td.solution-given.solution-correct{animation:none;background:#2c3e50;border-color:#333;color:white}
.play-clues{flex:1;min-width:180px;margin-top:0}
.clue-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:8px 12px;border-left:4px solid #bdc3c7;background:#f8f9fa;border-radius:6px;cursor:pointer;transition:.2s;font-family:'Patrick Hand',Verdana,sans-serif;font-size:1.1rem}
.clue-item:hover{background:#ecf0f1;transform:translateX(4px)}
.clue-item.active-clue{border-left-color:#3498db;background:#e8f4fd}
.clue-item.correct-clue{border-left-color:#27ae60;background:#e8f8f5}
.clue-number{display:inline-block;width:26px;height:26px;line-height:26px;text-align:center;background:#2c3e50;color:white;border-radius:4px;font-weight:bold;font-family:'Segoe UI',sans-serif}
.clue-text{font-weight:600;flex:1}
.clue-sum-box{background:white;border:1px solid #ddd;border-radius:6px;width:80px;padding:3px 6px;text-align:center;font-weight:normal;font-size:1rem;color:#2c3e50;white-space:nowrap;font-family:'Segoe UI',sans-serif}
.values-box{display:flex;flex-direction:column;gap:2px;margin:15px 0;padding:10px;background:#f1f2f6;border-radius:6px}
.val-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.val-letters{display:flex;gap:3px;min-width:160px}
.val-letter{background:white;padding:1px 5px;border-radius:4px;border:1px solid #ddd;font-size:12px}
.val-equals{font-weight:normal;margin:0 2px;width:14px;text-align:center}
.val-number{background:#2c3e50;color:white;padding:1px 6px;border-radius:6px;font-weight:normal;font-size:12px;min-width:24px;text-align:center}
@media print{body{background:white;padding:.5cm;max-width:100%}.container{box-shadow:none;padding:0}.top-bar button,.win-message,.header{display:none}.puzzle-banner{background:#2c3e50;color:white;padding:15px;margin-bottom:10px}.grid-wrapper{border:2px solid #2c3e50;background:#f1f2f6}td{width:36px;height:36px;font-size:18px;border-color:#000}td.active input{font-size:18px}.play-clues{font-size:.9rem}.clue-item{padding:4px 8px;margin-bottom:4px}.values-box{padding:6px}}
</style>
</head>
<body>
<div class="container">
<div class="header">
    <div class="logo">
        <h1>Quiz Ord</h1>
        <span class="sub">— språk & fantasi —</span>
    </div>
    <div class="instruction">Lös ord-gåtan med hjälp av<br>ledtrådarna du får fram från korsordet.</div>
    <div class="spacer"></div>
</div>
<div class="puzzle-banner" id="puzzleBanner">
    <h2>"${puzzleText.replace(/"/g,'&quot;')}"</h2>
    <small>Hovra eller klicka här för lösningsordets rad</small>
</div>
<div class="top-bar">
    <button onclick="resetGame()">🔄 Nollställ</button>
    <div class="win-message" id="winMessage">🏆 Grattis! Du hittade lösningsordet!</div>
    <h3 class="clues-heading">📝 Ledtrådar</h3>
</div>
<div class="play-grid">
    <div class="grid-wrapper"><table class="grid" id="crosswordGrid">${gridHtml}</table></div>
    <div class="play-clues">
        <div id="clueList">${cluesStaticHtml}</div>
        <h3 style="font-family:'Segoe UI',sans-serif;">🔢 Bokstavsvärden</h3>
        <div class="values-box">
            <div class="val-row"><div class="val-letters"><span class="val-letter">A</span><span class="val-letter">B</span><span class="val-letter">C</span><span class="val-letter">D</span><span class="val-letter">E</span><span class="val-letter">F</span></div><span class="val-equals">=</span><span class="val-number">1</span></div>
            <div class="val-row"><div class="val-letters"><span class="val-letter">G</span><span class="val-letter">H</span><span class="val-letter">I</span><span class="val-letter">J</span><span class="val-letter">K</span><span class="val-letter">L</span></div><span class="val-equals">=</span><span class="val-number">2</span></div>
            <div class="val-row"><div class="val-letters"><span class="val-letter">M</span><span class="val-letter">N</span><span class="val-letter">O</span><span class="val-letter">P</span><span class="val-letter">Q</span><span class="val-letter">R</span></div><span class="val-equals">=</span><span class="val-number">3</span></div>
            <div class="val-row"><div class="val-letters"><span class="val-letter">S</span><span class="val-letter">T</span><span class="val-letter">U</span><span class="val-letter">V</span><span class="val-letter">W</span><span class="val-letter">X</span></div><span class="val-equals">=</span><span class="val-number">4</span></div>
            <div class="val-row"><div class="val-letters"><span class="val-letter">Y</span><span class="val-letter">Z</span><span class="val-letter">Å</span><span class="val-letter">Ä</span><span class="val-letter">Ö</span></div><span class="val-equals">=</span><span class="val-number">5</span></div>
        </div>
    </div>
</div>
</div>
<script>
const puzzleText=${JSON.stringify(puzzleText)},solutionWord=${JSON.stringify(solutionWord)},clueData=${JSON.stringify(allClues.map((c,i)=>({id:i+1,text:c.text,answer:c.answer})))},grid=${JSON.stringify(grid)},gridSize=15;
let playerInputs={},activeWord=null,winShown=false;
const givenCells=${JSON.stringify(Object.fromEntries(Object.entries(givenCells).map(([k,v])=>[k,v.char])))};
for(let cellId in givenCells) playerInputs[cellId]=givenCells[cellId];
const getLetterValue=ch=>{const u=ch.toUpperCase();if("ABCDEF".includes(u))return 1;if("GHIJKL".includes(u))return 2;if("MNOPQR".includes(u))return 3;if("STUVWX".includes(u))return 4;if("YZÅÄÖ".includes(u))return 5;return 0;};
const calculateWordSum=word=>{let sum=0;for(let i=0;i<word.length;i++){sum+=getLetterValue(word.charAt(i));}return sum;};
function findWordPositions(g,w){const size=g.length;for(let y=0;y<size;y++){let row='',startX=-1;for(let x=0;x<size;x++){if(g[y][x]!==null){if(startX===-1)startX=x;row+=g[y][x];}else{if(row===w)return{y,x:startX,direction:'H'};row='';startX=-1;}}if(row===w)return{y,x:startX,direction:'H'};}for(let x=0;x<size;x++){let col='',startY=-1;for(let y=0;y<size;y++){if(g[y][x]!==null){if(startY===-1)startY=y;col+=g[y][x];}else{if(col===w)return{y:startY,x,direction:'V'};col='';startY=-1;}}if(col===w)return{y:startY,x,direction:'V'};}return null;}
const wordMap={};for(let clue of clueData){const pos=findWordPositions(grid,clue.answer);if(pos)wordMap[clue.answer]=pos;}const solutionPos=findWordPositions(grid,solutionWord);if(solutionPos)wordMap[solutionWord]=solutionPos;
const wordDirections={};for(let word in wordMap)wordDirections[word]=wordMap[word].direction;
const wordOrder=clueData.map(c=>c.answer).concat([solutionWord]);
let allWordInputs={},cellWords={},cellCoords={};
function buildMaps(){cellWords={};cellCoords={};for(let word in wordMap){const pos=wordMap[word];if(pos.direction==='H'){for(let i=0;i<word.length;i++){const cellId=pos.y+'-'+(pos.x+i);if(!cellWords[cellId])cellWords[cellId]=[];if(!cellWords[cellId].includes(word))cellWords[cellId].push(word);cellCoords[cellId]={x:pos.x+i,y:pos.y};}}else if(pos.direction==='V'){for(let i=0;i<word.length;i++){const cellId=(pos.y+i)+'-'+pos.x;if(!cellWords[cellId])cellWords[cellId]=[];if(!cellWords[cellId].includes(word))cellWords[cellId].push(word);cellCoords[cellId]={x:pos.x,y:pos.y+i};}}}}
buildMaps();
function renderGame(){
    const allInputs=document.querySelectorAll('#crosswordGrid input');
    allInputs.forEach(inp=>{const cellId=inp.dataset.cellId;inp.value=playerInputs[cellId]||'';});
    for(let clue of clueData){const liveSpan=document.getElementById('sum-live-'+clue.answer);if(liveSpan){let currentSum=0;const inputs=allWordInputs[clue.answer]||[];for(let inp of inputs){const val=inp.value.trim().toUpperCase();if(val)currentSum+=getLetterValue(val);}liveSpan.textContent=currentSum+' / '+calculateWordSum(clue.answer);}}
}
(function init(){
    const inputs=document.querySelectorAll('#crosswordGrid input');
    inputs.forEach(inp=>{const cellId=inp.dataset.cellId;const words=cellWords[cellId]||[];words.forEach(word=>{if(!allWordInputs[word])allWordInputs[word]=[];allWordInputs[word].push(inp);});});
    for(let word in allWordInputs){const dir=wordDirections[word];allWordInputs[word].sort((a,b)=>{const[ay,ax]=a.dataset.cellId.split('-').map(Number);const[by,bx]=b.dataset.cellId.split('-').map(Number);return dir==='H'?ax-bx:ay-by;});}
    const banner=document.getElementById('puzzleBanner');
    banner.onmouseenter=()=>setOutlineWord(solutionWord,true);
    banner.onmouseleave=()=>setOutlineWord(solutionWord,false);
    banner.onclick=()=>activateClue(solutionWord);
    document.querySelectorAll('.clue-item').forEach(item=>{const word=item.dataset.word;item.onmouseenter=()=>setOutlineWord(word,true);item.onmouseleave=()=>setOutlineWord(word,false);item.onclick=()=>activateClue(word);});
    inputs.forEach(input=>{
        input.addEventListener('focus',function(){this.select();const cellId=this.dataset.cellId;const words=cellWords[cellId]||[];if(activeWord&&words.includes(activeWord)){}else{const preferred=words.find(w=>w!==solutionWord)||solutionWord;setActiveWord(preferred);}});
        input.addEventListener('input',function(){this.value=this.value.toUpperCase();const cellId=this.dataset.cellId;playerInputs[cellId]=this.value;if(activeWord&&allWordInputs[activeWord]){const arr=allWordInputs[activeWord];const idx=arr.indexOf(this);if(idx!==-1&&idx<arr.length-1){arr[idx+1].focus();}}updateAllFilledStatus();renderGame();});
        input.addEventListener('keydown',function(e){
            if(e.key==='Tab'){e.preventDefault();if(activeWord&&wordOrder.includes(activeWord)){let nextIdx=(wordOrder.indexOf(activeWord)+1)%wordOrder.length;const nextWord=wordOrder[nextIdx];if(allWordInputs[nextWord]&&allWordInputs[nextWord].length>0){setActiveWord(nextWord);allWordInputs[nextWord][0].focus();}}return;}
            if(e.key==='Backspace'&&this.value===''){if(activeWord&&allWordInputs[activeWord]){const arr=allWordInputs[activeWord];const idx=arr.indexOf(this);if(idx>0){arr[idx-1].focus();}}e.preventDefault();return;}
            const arrowKeys=['ArrowRight','ArrowLeft','ArrowUp','ArrowDown'];if(arrowKeys.includes(e.key)){e.preventDefault();const cellId=this.dataset.cellId;const coords=cellCoords[cellId];if(!coords)return;let newX=coords.x,newY=coords.y;const stepX=e.key==='ArrowRight'?1:e.key==='ArrowLeft'?-1:0;const stepY=e.key==='ArrowDown'?1:e.key==='ArrowUp'?-1:0;newX+=stepX;newY+=stepY;let found=false;while(newY>=0&&newY<gridSize&&newX>=0&&newX<gridSize){const newCellId=newY+'-'+newX;const newInput=document.querySelector('input[data-cell-id="'+newCellId+'"]');if(newInput){newInput.focus();const words=cellWords[newCellId]||[];if(activeWord&&words.includes(activeWord)){}else{const preferred=words.find(w=>w!==solutionWord)||solutionWord;setActiveWord(preferred);}found=true;break;}const td=document.querySelector('td.active[data-cell-id="'+newCellId+'"]');if(!td)break;newX+=stepX;newY+=stepY;}if(!found){this.focus();}}});
        input.addEventListener('click',function(){this.select();const cellId=this.dataset.cellId;const words=cellWords[cellId]||[];if(activeWord&&words.includes(activeWord)){}else{const preferred=words.find(w=>w!==solutionWord)||solutionWord;setActiveWord(preferred);}});
    });
    updateAllFilledStatus();renderGame();
})();
function setActiveWord(word){if(activeWord){setOutlineWord(activeWord,false);document.querySelectorAll('.clue-item').forEach(el=>el.classList.remove('active-clue'));}activeWord=word;if(activeWord){setOutlineWord(activeWord,true);const clueItem=document.querySelector('.clue-item[data-word="'+activeWord+'"]');if(clueItem)clueItem.classList.add('active-clue');}}
function setOutlineWord(word,on){for(let cellId in cellWords){if(cellWords[cellId].includes(word)){const td=document.querySelector('td.active[data-cell-id="'+cellId+'"]');if(td){if(td.classList.contains('given'))continue;if(on)td.classList.add('word-active');else td.classList.remove('word-active');}}}}
function activateClue(word){if(!allWordInputs[word])return;setActiveWord(word);allWordInputs[word][0].focus();}
function updateAllFilledStatus(){
    const correctWords={};
    for(let word in wordMap){const inputs=allWordInputs[word];if(!inputs)continue;correctWords[word]=true;for(let inp of inputs){const cellId=inp.dataset.cellId;const[y,x]=cellId.split('-').map(Number);if(playerInputs[cellId]!==grid[y][x]){correctWords[word]=false;break;}}if(correctWords[word]){const pos=wordMap[word];if(pos){if(pos.direction==='H'){for(let i=0;i<word.length;i++){const cellId=pos.y+'-'+(pos.x+i);if(givenCells[cellId]&&playerInputs[cellId]!==grid[pos.y][pos.x+i]){correctWords[word]=false;break;}}}else{for(let i=0;i<word.length;i++){const cellId=(pos.y+i)+'-'+pos.x;if(givenCells[cellId]&&playerInputs[cellId]!==grid[pos.y+i][pos.x]){correctWords[word]=false;break;}}}}}}
    document.querySelectorAll('.clue-item').forEach(item=>{const word=item.dataset.word;if(correctWords[word]){item.classList.add('correct-clue');}else{item.classList.remove('correct-clue');}});
    document.querySelectorAll('#crosswordGrid td.active').forEach(td=>{const cellId=td.dataset.cellId;if(!cellId)return;const wordsForCell=cellWords[cellId]||[];const isSolutionCell=wordsForCell.includes(solutionWord);td.classList.remove('solution-correct');if(isSolutionCell&&correctWords[solutionWord]){td.classList.add('solution-correct');}});
    const winDiv=document.getElementById('winMessage');if(correctWords[solutionWord]&&!winShown){winDiv.style.display='block';winShown=true;}else if(!correctWords[solutionWord]){winDiv.style.display='none';winShown=false;}
}
window.resetGame=function(){
    playerInputs={};
    for(let cellId in givenCells){playerInputs[cellId]=givenCells[cellId];}
    activeWord=null;winShown=false;
    document.getElementById('winMessage').style.display='none';
    renderGame();
    // Rensa alla visuella markeringar efter att nya element skapats
    document.querySelectorAll('#crosswordGrid td.active').forEach(td => { td.classList.remove('solution-correct', 'word-active'); });
    document.querySelectorAll('.clue-item').forEach(el => { el.classList.remove('correct-clue', 'active-clue'); });
};
<\/script>
</body>
</html>`;

    const blob = new Blob([fullHtml], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `quizord_${solutionWord}.html`;
    a.click();
    URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
